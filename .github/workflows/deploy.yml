name: Deploy MystVPN Bot

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/MystBot

            echo ">>> Git pull..."
            git pull origin master

            echo ">>> Setup WireGuard (idempotent)..."
            ufw allow 51820/udp || true
            # Если WG ещё не настроен — генерируем пароль и хеш автоматически
            if ! grep -q "WG_PASSWORD_HASH" /root/MystBot/.env 2>/dev/null; then
              echo ">>> Configuring WireGuard password automatically..."
              WG_PASS="MystWG2026"
              WG_HASH=$(docker run --rm ghcr.io/wg-easy/wg-easy:14 wgpw "$WG_PASS" 2>/dev/null | grep -oP '\$2[ab]\$\d+\$[A-Za-z0-9./]+')
              if [ -n "$WG_HASH" ]; then
                echo "WG_HOST=77.110.96.77" >> /root/MystBot/.env
                echo "WG_PASSWORD_HASH=$WG_HASH" >> /root/MystBot/.env
                echo "WG_API_URL=http://wg-easy:51821" >> /root/MystBot/.env
                echo "WG_API_PASSWORD=$WG_PASS" >> /root/MystBot/.env
                echo ">>> WireGuard configured!"
              fi
            fi
            docker compose up -d wg-easy || true

            echo ">>> Rebuild & restart bot..."
            docker compose up -d --build bot

            echo ">>> Waiting for DB..."
            sleep 10

            echo ">>> Migrations..."
            docker compose exec -T bot python migrate.py || true

            echo ">>> Register backup cron (once)..."
            CRON_JOB="0 3 * * * /root/MystBot/scripts/backup.sh >> /root/MystBot/backup.log 2>&1"
            ( crontab -l 2>/dev/null | grep -qF "backup.sh" ) || \
              { crontab -l 2>/dev/null; echo "$CRON_JOB"; } | crontab -

            echo ">>> Status:"
            docker compose ps

            echo "✅ Deployed $(git rev-parse --short HEAD) at $(date)"
