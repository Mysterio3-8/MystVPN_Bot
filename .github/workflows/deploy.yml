name: Deploy MystVPN Bot

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASS }}
          script: |
            set -e
            cd /root/MystBot

            git pull origin master 2>/dev/null || git pull origin main

            chmod +x scripts/*.sh

            # Регистрируем автобэкап в cron (один раз, каждую ночь в 03:00)
            CRON_JOB="0 3 * * * /root/MystBot/scripts/backup.sh >> /root/MystBot/backup.log 2>&1"
            ( crontab -l 2>/dev/null | grep -qF "backup.sh" ) || \
              { crontab -l 2>/dev/null; echo "$CRON_JOB"; } | crontab -

            docker compose up -d --build bot
            docker compose up -d nginx certbot
            sleep 8
            docker compose exec -T bot python migrate.py || true

            docker compose ps
            echo "✅ Deployed at $(date)"
