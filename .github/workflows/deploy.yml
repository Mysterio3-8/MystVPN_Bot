name: Deploy MystVPN Bot

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Авторизуем локальный ключ Claude (одноразово)
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            LOCAL_KEY="ssh-rsa  infinix\infinix@Infinix"
            grep -qF "$LOCAL_KEY" ~/.ssh/authorized_keys 2>/dev/null || echo "$LOCAL_KEY" >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys

            # ── Миграция: переименовываем /root/MystBot → /root/Full_Bot (один раз) ──
            if [ -d /root/MystBot ] && [ ! -d /root/Full_Bot ]; then
              echo ">>> Migrating /root/MystBot → /root/Full_Bot..."
              mv /root/MystBot /root/Full_Bot
              echo ">>> Migration done"
            fi

            # ── Рабочая папка ──
            cd /root/Full_Bot

            # ── Перемещаем .env из корня в VPN-Bot/ если он там ещё ──
            if [ -f /root/Full_Bot/.env ] && [ ! -f /root/Full_Bot/VPN-Bot/.env ]; then
              echo ">>> Moving .env → VPN-Bot/.env"
              cp /root/Full_Bot/.env /root/Full_Bot/VPN-Bot/.env
            fi

            echo ">>> Git sync (reset to remote)..."
            git fetch origin
            git reset --hard origin/master

            # ── После pull: убедимся что .env в VPN-Bot/ ──
            if [ -f /root/Full_Bot/.env ] && [ ! -f /root/Full_Bot/VPN-Bot/.env ]; then
              echo ">>> Copying .env to VPN-Bot/"
              cp /root/Full_Bot/.env /root/Full_Bot/VPN-Bot/.env
            fi

            echo ">>> Update site..."
            mkdir -p /var/www/guide
            cp -r /root/Full_Bot/VPN-Site/* /var/www/guide/
            chmod -R 755 /var/www/guide

            echo ">>> Setup WireGuard (idempotent)..."
            ufw allow 51820/udp || true
            if ! grep -q "WG_PASSWORD_HASH" /root/Full_Bot/VPN-Bot/.env 2>/dev/null; then
              echo ">>> Configuring WireGuard password automatically..."
              WG_PASS="MystWG2026"
              WG_HASH=$(docker run --rm ghcr.io/wg-easy/wg-easy:14 wgpw "$WG_PASS" 2>/dev/null | grep -oP '\$2[ab]\$\d+\$[A-Za-z0-9./]+')
              if [ -n "$WG_HASH" ]; then
                echo "WG_HOST=77.110.96.77" >> /root/Full_Bot/VPN-Bot/.env
                echo "WG_PASSWORD_HASH=$WG_HASH" >> /root/Full_Bot/VPN-Bot/.env
                echo "WG_API_URL=http://wg-easy:51821" >> /root/Full_Bot/VPN-Bot/.env
                echo "WG_API_PASSWORD=$WG_PASS" >> /root/Full_Bot/VPN-Bot/.env
              fi
            fi
            docker compose up -d wg-easy || true

            echo ">>> Rebuild & restart bot..."
            docker compose up -d --build bot

            echo ">>> Waiting for DB..."
            sleep 10

            echo ">>> Migrations..."
            docker compose exec -T bot python migrate.py || true

            echo ">>> Register backup cron (once)..."
            CRON_JOB="0 3 * * * /root/Full_Bot/VPN-Bot/scripts/backup.sh >> /root/Full_Bot/backup.log 2>&1"
            ( crontab -l 2>/dev/null | grep -qF "backup.sh" ) || \
              { crontab -l 2>/dev/null; echo "$CRON_JOB"; } | crontab -

            echo ">>> Status:"
            docker compose ps

            echo "✅ Deployed $(git rev-parse --short HEAD) at $(date)"
