server {
    listen 80;
    server_name keybest.cc;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://keybest.cc$request_uri; }
}

server {
    listen 8444 ssl http2;
    server_name keybest.cc;

    ssl_certificate /etc/letsencrypt/live/keybest.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keybest.cc/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    location /webhook/yookassa {
        proxy_pass http://127.0.0.1:8090/webhook/yookassa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /fkbumQABLZHiek0B/ {
        proxy_pass https://127.0.0.1:2096/fkbumQABLZHiek0B/;
        proxy_ssl_verify off;
        # Rewrite XHTTP direct IP:port to domain (Cloudflare compatible)
        sub_filter '77.110.96.77:2052' 'keybest.cc:443';
        sub_filter_once off;
        sub_filter_types *;
        proxy_set_header Host keybest.cc;
        proxy_set_header X-Real-IP 77.110.96.77;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header profile-title;
        proxy_hide_header profile-update-interval;
        proxy_hide_header profile-web-page-url;
        proxy_hide_header support-url;
        proxy_hide_header content-disposition;
        add_header profile-title "MystVPN" always;
        add_header profile-update-interval "12" always;
        add_header support-url "https://t.me/Myst_support" always;
        add_header profile-web-page-url "https://keybest.cc" always;
        add_header content-disposition "attachment; filename=MystVPN" always;
    }

    location /health {
        proxy_pass http://127.0.0.1:8090/health;
        access_log off;
    }

    location /guide {
        alias /var/www/guide/;
        index index.html;
        try_files $uri $uri/ /guide/index.html;
        add_header Cache-Control "no-cache";
    }

    location /favicon.ico {
        root /var/www/html;
        expires 30d;
        access_log off;
    }

    location /logo.png {
        root /var/www/html;
        expires 30d;
        access_log off;
    }

    # XHTTP transport — второй протокол, ТСПУ не детектирует
    location /dl {
        proxy_pass https://127.0.0.1:2052;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
        proxy_buffering off;
    }

    location / {
        root /var/www/keybest;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
