name: mystvpn
description: Universal VPN client with CPN protocol support
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^1.0.0
  http: ^1.2.0
  crypto: ^3.0.0
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  flutter_svg: ^2.0.0
  provider: ^6.1.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true