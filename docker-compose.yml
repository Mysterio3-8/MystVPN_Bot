name: mystbot

services:
  bot:
    build: ./VPN-Bot
    restart: unless-stopped
    env_file: ./VPN-Bot/.env
    ports:
      - "127.0.0.1:8090:8090"
    networks:
      - mystvpn
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./VPN-Bot/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./VPN-Site:/usr/share/nginx/html:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - mystvpn
    depends_on:
      - bot

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mystvpn_bot
      POSTGRES_USER: mystvpn
      POSTGRES_PASSWORD: mystvpn_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mystvpn -d mystvpn_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mystvpn

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - mystvpn

  support-bot:
    build: ./Support_Bot
    restart: unless-stopped
    env_file: ./Support_Bot/.env
    volumes:
      - support_db:/app
    networks:
      - mystvpn

  mtproxy:
    image: telegrammessenger/proxy:latest
    restart: unless-stopped
    ports:
      - "2443:443"
    volumes:
      - mtproxy_data:/data
    environment:
      - SECRET=ee29b6d25c373376a63f2e10fdb2b845ed
      - TAG=ВСТАВЬ_TAG_ИЗ_MTPROXYBOT

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_www:
  mtproxy_data:
  support_db:

networks:
  mystvpn:
    driver: bridge
