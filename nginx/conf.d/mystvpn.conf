# HTTP: ACME challenge only + redirect to HTTPS
# На этапе до SSL сертификата — работает в HTTP-режиме (ssl блок закомментирован)
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Временно: прямой проксинг по HTTP (до получения SSL)
    # После init-ssl.sh раскомментируй блок ниже и удали эти location-ы
    location /webhook {
        proxy_pass http://bot:8090/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://bot:8090/health;
        access_log off;
    }

    location / {
        return 444;
    }
}

